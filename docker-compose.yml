services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_BIND_ADDRESS:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
