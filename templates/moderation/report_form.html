{% extends "base.html" %}

{% block content %}
<h1 class="h4 mb-3">Report submission</h1>
<p class="text-muted">Submission #{{ submission.id }} in {{ season.title }}</p>
<form method="post" class="card">
    {% csrf_token %}
    <div class="card-body">
        {% include "includes/form_fields.html" with form=form %}
    </div>
    <div class="card-footer d-flex justify-content-end gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'season-detail' season.slug %}">Cancel</a>
        <button class="btn btn-danger" type="submit">Submit report</button>
    </div>
</form>
{% endblock %}
