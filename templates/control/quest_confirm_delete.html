{% extends "base.html" %}

{% block content %}
<h1 class="h3 mb-3">Delete quest</h1>
<div class="alert alert-warning">This will delete quest <strong>{{ quest.title }}</strong>.</div>
<form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <a class="btn btn-outline-secondary" href="{% url 'control-dashboard' %}">Cancel</a>
    <button class="btn btn-danger" type="submit">Delete quest</button>
</form>
{% endblock %}
